; Global settings shared across all configurations
[env]
platform = espressif32
board = waveshare_esp32_s3_zero
framework = espidf
monitor_speed = 115200

; Configuration for Board 1: Master (Central Hub with Display)
[env:master_node]
build_flags = 
    -D ROLE_MASTER
    -D PROTOCOL_CAN
;    -D PROTOCOL_I2C
;    -D PROTOCOL_SPI
;    -D PROTOCOL_UART

; Configuration for Board 2: Slave 1 
[env:slave_env]
build_flags = 
    -D ROLE_SLAVE_ENV
    -D PROTOCOL_CAN
;    -D PROTOCOL_I2C
;    -D PROTOCOL_SPI
;    -D PROTOCOL_UART

; Configuration for Board 3: Slave 2
[env:slave_motion]
build_flags = 
    -D ROLE_SLAVE_MOTION
    -D PROTOCOL_CAN
;    -D PROTOCOL_I2C
;    -D PROTOCOL_SPI
;    -D PROTOCOL_UART
